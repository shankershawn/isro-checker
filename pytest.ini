[pytest]
# Pytest configuration for ISRO Mission Checker tests

# Minimum Python version
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts =
    -v
    --strict-markers
    --tb=short
    --cov=com
    --cov-report=html
    --cov-report=term-missing
    --cov-report=xml

# Markers for test categorization
markers =
    unit: Unit tests for individual modules
    integration: Integration tests for workflows
    slow: Slow running tests
    email: Tests related to email functionality
    redis: Tests related to Redis functionality
    selenium: Tests related to Selenium web driver

testpaths = tests

# Ignore warnings from external libraries
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

