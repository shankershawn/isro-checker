name: Test Suite

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.8', '3.9', '3.10', '3.11']

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements-test.txt

    - name: Lint with flake8
      continue-on-error: true
      run: |
        pip install flake8
        # stop the build if there are Python syntax errors or undefined names
        flake8 com --count --select=E9,F63,F7,F82 --show-source --statistics || true
        # exit-zero treats all errors as warnings
        flake8 com --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics || true

    - name: Run unit tests
      run: |
        pytest tests/test_no_duplicate_logger.py -v
        pytest tests/test_email_utils.py -v
        pytest tests/test_edge_cases_clean.py -v

    - name: Run all tests with coverage
      run: |
        pytest tests/test_no_duplicate_logger.py tests/test_email_utils.py tests/test_edge_cases_clean.py --cov=com --cov-report=xml --cov-report=term-missing -v

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

  code-quality:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pylint black isort

    - name: Check code formatting with black
      continue-on-error: true
      run: |
        black --check com tests || true

    - name: Check import sorting with isort
      continue-on-error: true
      run: |
        isort --check-only com tests || true

    - name: Lint with pylint
      continue-on-error: true
      run: |
        pylint com --disable=all --enable=E,F || true
